<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding Dashboard 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --accent4: #f7971e;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --card: #16161f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1025 50%, #0f1a1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo h1 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .refresh-info {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .refresh-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* MONTH SELECTOR */
  .month-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 4px;
    overflow-x: auto;
  }

  .month-btn {
    padding: 14px 20px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .month-btn:hover { color: var(--text); }
  .month-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* TABS */
  .tabs-bar {
    background: var(--surface2);
    padding: 0 32px;
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    padding: 16px 24px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-btn .badge {
    background: var(--accent);
    color: white;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 700;
  }

  /* MAIN CONTENT */
  .main { padding: 32px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* LOADING */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    gap: 16px;
    color: var(--muted);
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* STATS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: var(--accent); }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent-color, var(--accent));
  }

  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 500;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-sub {
    font-size: 12px;
    color: var(--muted);
  }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: -0.3px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* STATUS TABLE */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .data-table th {
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    font-family: 'Syne', sans-serif;
  }

  .data-table td {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }

  .data-table tr:hover td { background: rgba(108,99,255,0.05); }

  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  /* STATUS BADGE */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .status-resolvido { background: rgba(67,233,123,0.15); color: #43e97b; }
  .status-andamento { background: rgba(247,151,30,0.15); color: #f7971e; }
  .status-agendado { background: rgba(108,99,255,0.15); color: #a89cff; }
  .status-semretorno { background: rgba(255,101,132,0.15); color: #ff6584; }
  .status-inacessivel { background: rgba(107,107,138,0.2); color: var(--muted); }
  .status-invalido { background: rgba(107,107,138,0.15); color: #888; }
  .status-cancelado { background: rgba(255,50,50,0.15); color: #ff5555; }
  .status-default { background: rgba(107,107,138,0.15); color: var(--muted); }

  /* AGENT CARDS */
  .agents-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .agent-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .agent-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .agent-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    flex-shrink: 0;
  }

  .agent-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
  }

  .agent-total {
    margin-left: auto;
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
  }

  .agent-stats { padding: 16px 20px; }

  .agent-stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .agent-stat-row:last-child { border: none; }

  .agent-stat-label { color: var(--muted); }
  .agent-stat-value { font-weight: 600; }

  /* RANKING */
  .ranking-list { display: flex; flex-direction: column; gap: 8px; }

  .ranking-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .rank-pos {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    width: 28px;
    text-align: center;
  }

  .rank-name {
    font-weight: 500;
    font-size: 14px;
    flex: 1;
  }

  .rank-value {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
  }

  /* TWO COLS */
  .two-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 32px;
  }

  @media (max-width: 900px) { .two-cols { grid-template-columns: 1fr; } }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-group { display: flex; align-items: center; gap: 8px; }

  .filter-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
  }

  select, input[type="date"], input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  select:hover, input:hover { border-color: var(--accent); }
  select:focus, input:focus { border-color: var(--accent); }

  /* AGENT FILTER PILLS */
  .agent-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .agent-pill {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .agent-pill:hover { border-color: var(--accent); color: var(--text); }
  .agent-pill.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* TODAY CARDS */
  .today-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }

  .today-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    transition: border-color 0.2s;
    position: relative;
  }

  .today-card:hover { border-color: var(--accent); }

  .today-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .today-aluno {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 3px;
  }

  .today-agente {
    font-size: 12px;
    color: var(--muted);
  }

  .today-hora {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    text-align: right;
  }

  .today-hora-label {
    font-size: 10px;
    color: var(--muted);
    text-align: right;
  }

  .today-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .meta-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 11px;
    color: var(--muted);
  }

  .meta-chip strong { color: var(--text); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* PROGRESS BAR */
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.6s ease;
  }

  /* GRID 3 */
  .three-cols {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  @media (max-width: 800px) { .three-cols { grid-template-columns: 1fr; } }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 999;
    animation: slideUp 0.3s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .error-msg {
    background: rgba(255,101,132,0.1);
    border: 1px solid rgba(255,101,132,0.3);
    color: #ff6584;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 20px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  .col-header { color: var(--accent); font-weight: 700; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">🎓</div>
    <h1>Onboarding <span>Dashboard</span></h1>
  </div>
  <div class="header-right">
    <div class="refresh-info">
      <div class="refresh-dot"></div>
      <span id="last-update">Carregando...</span>
    </div>
    <button onclick="refreshData()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;">
      ↻ Atualizar
    </button>
  </div>
</div>

<!-- MONTH SELECTOR -->
<div class="month-bar" id="month-bar"></div>

<!-- TABS -->
<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('analise-geral', this)">
    📊 Análise Geral
  </button>
  <button class="tab-btn" onclick="switchTab('analise-individual', this)">
    👤 Por Agente
  </button>
  <button class="tab-btn" onclick="switchTab('agendamentos-hoje', this)">
    📅 Agendamentos do Dia <span class="badge" id="hoje-badge">0</span>
  </button>
  <button class="tab-btn" onclick="switchTab('todos-agendamentos', this)">
    🔍 Todos os Agendamentos
  </button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TAB: ANÁLISE GERAL -->
  <div class="tab-content active" id="tab-analise-geral">
    <div id="geral-content">
      <div class="loading-state"><div class="spinner"></div><p>Carregando dados...</p></div>
    </div>
  </div>

  <!-- TAB: ANÁLISE INDIVIDUAL -->
  <div class="tab-content" id="tab-analise-individual">
    <div id="individual-content">
      <div class="loading-state"><div class="spinner"></div><p>Carregando dados...</p></div>
    </div>
  </div>

  <!-- TAB: AGENDAMENTOS HOJE -->
  <div class="tab-content" id="tab-agendamentos-hoje">
    <div id="hoje-content">
      <div class="loading-state"><div class="spinner"></div><p>Carregando dados...</p></div>
    </div>
  </div>

  <!-- TAB: TODOS OS AGENDAMENTOS -->
  <div class="tab-content" id="tab-todos-agendamentos">
    <div class="filters">
      <div class="filter-group">
        <span class="filter-label">Data</span>
        <input type="date" id="filter-data" onchange="renderTodos()">
      </div>
      <div class="filter-group">
        <span class="filter-label">Mês</span>
        <select id="filter-mes" onchange="renderTodos()">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Agente</span>
        <select id="filter-agente-todos" onchange="renderTodos()">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Status</span>
        <select id="filter-status-todos" onchange="renderTodos()">
          <option value="">Todos</option>
        </select>
      </div>
      <button onclick="clearFilters()" style="background:none;border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;">
        Limpar filtros
      </button>
    </div>
    <div id="todos-content">
      <div class="loading-state"><div class="spinner"></div><p>Carregando dados...</p></div>
    </div>
  </div>

</div>

<script>
// ==========================================
// CONFIGURAÇÃO
// ==========================================
const PUBLISHED_ID = '2PACX-1vQRm9e04fBjJyzHZVJN8rQXbsNLbs1YF3QjLh51cI92SH_OpsrjldQ_Q2q-AIPczqqpJtLE-KKPjGrr';
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MESES_DISPONIVEIS = ['Janeiro','Fevereiro','Março']; // Adicione novos meses aqui conforme criar as abas

const AGENT_COLORS = {
  default: ['#6c63ff','#ff6584','#43e97b','#f7971e','#00c6ff','#f953c6'],
};

let currentMonth = 'Março';
let allData = {}; // cache por mês
let refreshTimer = null;

// ==========================================
// UTILS
// ==========================================
function sheetUrl(sheetName) {
  const encoded = encodeURIComponent(sheetName);
  return `https://docs.google.com/spreadsheets/d/e/${PUBLISHED_ID}/pub?output=csv&sheet=${encoded}`;
}

async function fetchSheet(sheetName) {
  const url = sheetUrl(sheetName);
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Aba "${sheetName}" não encontrada`);
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const lines = text.split('\n');
  const rows = lines.map(line => {
    const cells = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cells.push(cur.trim());
    return cells;
  }).filter(r => r.some(c => c !== ''));
  return rows;
}

function parseDate(str) {
  if (!str) return null;
  // Aceita dd/mm, dd/mm/yyyy, dd/mm/yy
  const s = str.replace(/"/g, '').trim();
  const parts = s.split('/');
  if (parts.length >= 2) {
    const d = parseInt(parts[0]);
    const m = parseInt(parts[1]) - 1;
    const y = parts[2] ? (parts[2].length === 2 ? 2000 + parseInt(parts[2]) : parseInt(parts[2])) : new Date().getFullYear();
    if (!isNaN(d) && !isNaN(m)) return new Date(y, m, d);
  }
  return null;
}

function formatDate(date) {
  if (!date) return '';
  return `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}`;
}

function todayStr() {
  const t = new Date();
  return `${String(t.getDate()).padStart(2,'0')}/${String(t.getMonth()+1).padStart(2,'0')}/${t.getFullYear()}`;
}

function todayDateStr() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}

function getStatusClass(s) {
  if (!s) return 'status-default';
  const lower = s.toLowerCase().replace(/\s/g,'');
  if (lower.includes('resolvido')) return 'status-resolvido';
  if (lower.includes('andamento')) return 'status-andamento';
  if (lower.includes('agendado')) return 'status-agendado';
  if (lower.includes('semretorno') || lower.includes('retorno')) return 'status-semretorno';
  if (lower.includes('inacess')) return 'status-inacessivel';
  if (lower.includes('inv')) return 'status-invalido';
  if (lower.includes('cancel')) return 'status-cancelado';
  return 'status-default';
}

function agentColor(name, idx) {
  const colors = ['#6c63ff','#ff6584','#43e97b','#f7971e','#00c6ff','#f953c6'];
  if (!name) return colors[0];
  const hash = name.split('').reduce((a,c) => a + c.charCodeAt(0), 0);
  return colors[hash % colors.length];
}

function agentInitial(name) {
  return name ? name.charAt(0).toUpperCase() : '?';
}

function clean(v) {
  return (v || '').replace(/^"|"$/g, '').trim();
}

// ==========================================
// DATA LOADING
// ==========================================
async function loadMonthData(month) {
  if (allData[month]) return; // cache hit

  const onbSheet = `Onboarding ${month}`;

  try {
    const rows = await fetchSheet(onbSheet);
    // Row 0 = headers
    const headers = rows[0] || [];
    const data = rows.slice(1).map(r => {
      const obj = {};
      headers.forEach((h, i) => { obj[clean(h)] = clean(r[i] || ''); });
      return obj;
    });
    allData[month] = { rows: data, headers: headers.map(clean) };
  } catch(e) {
    allData[month] = { rows: [], headers: [], error: e.message };
  }
}

// ==========================================
// COLUMN MAPPING (baseado nos prints)
// ==========================================
// Colunas da aba Onboarding (ordem aproximada dos prints):
// A: DIST RELATÓRIO / RELATÓRIO, B: AGENTE, C: LÍDER DE EXÉRCITO,
// D: LÍDER COMERCIAL, E: COMERCIAL, F: ID SF, G: CONTA, H: DATA MAT,
// I: PAÍS, J: ALUNO, K: TELEFONE, L: EMAIL,
// M: INICIO AULAS, N: PLANO, O: R$ LIVE, P: R$ WOL,
// Q: DIAS/TURMA, R: HORÁRIO TURMA, S: 1º RETORNO ALUNO,
// T: DATA DA RESOLUÇÃO, U: STATUS, V: DIA DA AULA ZERO,
// W: HORA RIO DA AULA ZERO, X: REALIZADO AULA ZERO?,
// Y: CANAL REALIZADO AULA ZERO, Z: ALUNO C/ CAMERA?,
// AA: ENVIADO ARQUIVO PDF?, AB: QUEM REALIZOU O CADASTRO?,
// AC: FORMA DE PGTO?, AD: TEM PRESENÇA NA AULA,
// AE: TENTATIVAS DE CONTATO AGENTE, AF: AÇÕES REALIZADAS,
// AG: AGENDAMENTO REALIZADO POR, AH: TABULAÇÕES,
// AI: DESCRIÇÃO, AJ: DATA DO CANCELAMENTO

function getCol(row, ...names) {
  for (const n of names) {
    if (row[n] !== undefined && row[n] !== '') return row[n];
    // fuzzy: try partial match
    const key = Object.keys(row).find(k => k.toLowerCase().includes(n.toLowerCase()));
    if (key && row[key] !== '') return row[key];
  }
  return '';
}

function renderTodos() {
  const el = document.getElementById('todos-content');

  let allRows = [];
  Object.entries(allData).forEach(([month, d]) => {
    if (d && d.rows) d.rows.forEach(r => allRows.push({...r, _month: month}));
  });

  // Só linhas com DIA DA AULA ZERO preenchido
  let rows = allRows.filter(r => getCol(r,'DIA DA AULA ZERO','DIA AULA ZERO','DIA DA AULA'));

  // Filtros
  const filtData = document.getElementById('filter-data')?.value;
  const filtMes = document.getElementById('filter-mes')?.value;
  const filtAgente = document.getElementById('filter-agente-todos')?.value;
  const filtStatus = document.getElementById('filter-status-todos')?.value;

  if (filtData) {
    const [yyyy,mm,dd] = filtData.split('-');
    const target = `${dd}/${mm}/${yyyy}`;
    rows = rows.filter(r => {
      const daz = getCol(r,'DIA DA AULA ZERO','DIA AULA ZERO','DIA DA AULA');
      const parsed = parseDate(daz);
      return parsed && formatDate(parsed) === target;
    });
  }
  if (filtMes) rows = rows.filter(r => r._month === filtMes);
  if (filtAgente) rows = rows.filter(r => getCol(r,'AGENTE') === filtAgente);
  if (filtStatus) rows = rows.filter(r => getCol(r,'STATUS') === filtStatus);

  // Sort by date
  rows.sort((a,b) => {
    const da = parseDate(getCol(a,'DIA DA AULA ZERO','DIA AULA ZERO','DIA DA AULA'));
    const db = parseDate(getCol(b,'DIA DA AULA ZERO','DIA AULA ZERO','DIA DA AULA'));
    if (!da && !db) return 0;
    if (!da) return 1;
    if (!db) return -1;
    return da - db;
  });

  el.innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">${rows.length} agendamento(s) encontrado(s)</div>
    ${rows.length === 0 ? `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <p>Nenhum agendamento encontrado com os filtros selecionados</p>
      </div>
    ` : `
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr>
            <th>Data AZ</th>
            <th>Horário</th>
            <th>Aluno</th>
            <th>Agente</th>
            <th>Conta</th>
            <th>Plano</th>
            <th>Status</th>
            <th>Mês</th>
          </tr></thead>
          <tbody>
            ${rows.map(r => {
              const daz = getCol(r,'DIA DA AULA ZERO','DIA AULA ZERO','DIA DA AULA');
              const parsed = parseDate(daz);
              const isToday = parsed && formatDate(parsed) === todayStr();
              return `
                <tr style="${isToday ? 'background:rgba(108,99,255,0.08)' : ''}">
                  <td>
                    ${formatDate(parsed) || daz || '—'}
                    ${isToday ? '<span class="status-badge status-agendado" style="margin-left:6px;font-size:9px">HOJE</span>' : ''}
                  </td>
                  <td><strong>${getCol(r,'HORA RIO DA AULA ZERO','HORÁRIO DA AULA ZERO','HORA RIO') || '—'}</strong></td>
                  <td>${getCol(r,'ALUNO') || '—'}</td>
                  <td>
                    <div style="display:flex;align-items:center;gap:8px">
                      <div style="width:24px;height:24px;border-radius:50%;background:${agentColor(getCol(r,'AGENTE'),0)}22;color:${agentColor(getCol(r,'AGENTE'),0)};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">${agentInitial(getCol(r,'AGENTE'))}</div>
                      ${getCol(r,'AGENTE') || '—'}
                    </div>
                  </td>
                  <td>${getCol(r,'CONTA') || '—'}</td>
                  <td>${getCol(r,'PLANO') || '—'}</td>
                  <td><span class="status-badge ${getStatusClass(getCol(r,'STATUS'))}">${getCol(r,'STATUS') || '—'}</span></td>
                  <td style="color:var(--muted)">${r._month || '—'}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    `}
  `;
}

function clearFilters() {
  document.getElementById('filter-data').value = '';
  document.getElementById('filter-mes').value = '';
  document.getElementById('filter-agente-todos').value = '';
  document.getElementById('filter-status-todos').value = '';
  renderTodos();
}

// ==========================================
// TAB SWITCHING
// ==========================================
function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
  renderCurrentTab();
}

function renderCurrentTab() {
  const active = document.querySelector('.tab-content.active')?.id;
  if (active === 'tab-analise-geral') renderGeralTab();
  else if (active === 'tab-analise-individual') renderIndividualTab();
  else if (active === 'tab-agendamentos-hoje') renderHojeTab();
  else if (active === 'tab-todos-agendamentos') { populateFilters(); renderTodos(); }
}

// ==========================================
// INIT & REFRESH
// ==========================================
async function loadAllMonths() {
  await Promise.all(MESES_DISPONIVEIS.map(m => loadMonthData(m)));
}

async function refreshData() {
  allData = {};
  document.getElementById('last-update').textContent = 'Atualizando...';
  await loadAllMonths();
  renderCurrentTab();
  const now = new Date();
  document.getElementById('last-update').textContent =
    `Atualizado às ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  // Toast
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = '✅ Dados atualizados com sucesso!';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

async function init() {
  // Set default filter date to today
  document.getElementById('filter-data').value = todayDateStr();

  renderMonthBar();
  await loadAllMonths();

  const now = new Date();
  document.getElementById('last-update').textContent =
    `Atualizado às ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  renderGeralTab();
  renderHojeTab(); // Pre-render for badge

  // Auto-refresh a cada 5 minutos
  refreshTimer = setInterval(refreshData, 5 * 60 * 1000);
}

init();
</script>
</body>
</html>
